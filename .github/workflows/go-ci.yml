name: Go CI

on:
  push:
    paths:
      - 'api/**'
      - '.github/workflows/go-ci.yml'
  pull_request:
    paths:
      - 'api/**'
      - '.github/workflows/go-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
